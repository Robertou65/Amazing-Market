name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint backend (Pylint)
        working-directory: backend
        run: pylint --errors-only app

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: amazing_market
          MYSQL_USER: app_user
          MYSQL_PASSWORD: Pz0@PhXifvht94%I
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Initialize database schema
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_USER: app_user
          DB_PASSWORD: Pz0@PhXifvht94%I
          DB_NAME: amazing_market
          DB_PORT: 3306
        run: |
          mysql -h 127.0.0.1 -u app_user -p'Pz0@PhXifvht94%I' amazing_market < database.sql

      - name: Run backend tests
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_USER: app_user
          DB_PASSWORD: Pz0@PhXifvht94%I
          DB_NAME: amazing_market
          DB_PORT: 3306
        run: pytest

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:run

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: amazing_market
          MYSQL_USER: app_user
          MYSQL_PASSWORD: Pz0@PhXifvht94%I
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Initialize database schema
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_USER: app_user
          DB_PASSWORD: Pz0@PhXifvht94%I
          DB_NAME: amazing_market
          DB_PORT: 3306
        run: |
          mysql -h 127.0.0.1 -u app_user -p'Pz0@PhXifvht94%I' amazing_market < database.sql

      - name: Generate backend coverage (HTML)
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_USER: app_user
          DB_PASSWORD: Pz0@PhXifvht94%I
          DB_NAME: amazing_market
          DB_PORT: 3306
        run: pytest --cov=app --cov-report=term --cov-report=html:htmlcov

      - name: Generate frontend coverage (HTML)
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload backend coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: backend/htmlcov

      - name: Upload frontend coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-html
          path: frontend/coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
